project: warranty-analytics
location: eastus
resource_group: warranty-ml-rg
workspace: warranty-ml-ws

# POC Mode: Set to true for cost-optimized configuration
poc_mode: true

compute:
  name: cpu-cluster
  size: STANDARD_DS3_V2
  min_instances: 0
  max_instances: 4
  low_priority: false
  
  # POC Configuration (when poc_mode: true)
  poc:
    name: cpu-cluster-poc
    size: STANDARD_DS2_V2  # Smaller, cheaper VM
    min_instances: 0
    max_instances: 1       # Only 1 node for POC
    low_priority: true     # 50-80% cost reduction

endpoints:
  closure:
    name: ep-warranty-close
    auth_mode: key
    sku: standard

powerbi:
  refresh_cron: "0 5 * * *"   # 5am UTC daily
  parameters:
    aml_endpoint_url: https://<region>.inference.ml.azure.com/ep-warranty-close/score
    aml_api_key_secret_name: aml-ep-key

security:
  rls:
    - role: TeamViewer
      filter: "[RCA: Solving Team] = USERPRINCIPALNAME()"

ml:
  target_horizon_days: 60
  min_auc: 0.75
  retrain_frequency_days: 30
  embedding_model: sentence-transformers/all-MiniLM-L6-v2
  num_clusters: 15
  batch_size: 500
  
  # POC Configuration (when poc_mode: true)
  poc:
    min_auc: 0.70              # Slightly lower for POC
    retrain_frequency_days: 90 # Less frequent
    num_clusters: 10           # Fewer clusters
    batch_size: 250            # Smaller batches
    sample_size: 5000          # Use subset of data
